---
- name: Windows Python (Chocolatey public feed)
  hosts: "os_windows"
  gather_facts: true
  tasks:
    - name: End play on non-Windows hosts
      ansible.builtin.meta: end_host
      when: ansible_os_family != 'Windows'

    - name: Install Python 3 via the public Chocolatey feed
      chocolatey.chocolatey.win_chocolatey:
        name: python3
        state: present
