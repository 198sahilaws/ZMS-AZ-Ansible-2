---
- name: Windows AD DS forest promotion
  hosts: "role_dc"
  gather_facts: true
  tasks:
    - name: End play on non-Windows hosts
      ansible.builtin.meta: end_host
      when: ansible_os_family != 'Windows'

    - name: Install AD DS and promote the forest
      microsoft.ad.domain:
        dns_domain_name: "{{ ad_domain_name | default('zms.local') }}"
        domain_netbios_name: "{{ ad_netbios_name | default('ZMS') }}"
        safe_mode_password: >-
          {{ (lookup('azure.azcollection.azure_keyvault_secret',
              ansible_secret_name, vault_url=azure_keyvault_url)
             | from_json).dsrm_password }}
        reboot: true
      no_log: true

    - name: Point the DC's DNS forwarder at Azure DNS for internet resolution
      ansible.windows.win_powershell:
        script: |
          $fwd = '{{ dc_dns_forwarder | default("168.63.129.16") }}'
          $current = @((Get-DnsServerForwarder -ErrorAction SilentlyContinue).IPAddress.IPAddressToString)
          if ($current -notcontains $fwd) {
            Add-DnsServerForwarder -IPAddress $fwd
            $Ansible.Changed = $true
          }
          else {
            $Ansible.Changed = $false
          }
